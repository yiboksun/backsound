<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <title>Back Sound</title>

  <style>
    body {
      margin: 0;
      background-color: #111827;
      font-family: Arial;
      overflow: hidden;

  
    }

   #ui {
  position: absolute;
  top: 60%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 26px;
  text-align: center;
  z-index: 10;
}

#level {
  font-size: 28px;
  font-weight: bold;
}

#warning {
  margin-top: 10px;
  font-size: 28px;
  color: red;
  font-weight: bold;
}

    /* 시작 화면 */
    #startScreen {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: rgb(255, 255, 255);
    }

    h1 {
      font-size: 50px;
      margin-bottom: 30px;
    }

    button {
      background-color: #35353549;
      color: white;
      border: none;
      padding: 18px 40px;
      border-radius: 15px;
      font-size: 20px;
      cursor: pointer;
    }

    button:hover {
      background-color: #c3db9c;
    }

    /* 메인 화면 */
    #mainScreen {
  display: none;
  width: 100vw;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

    canvas {
      width: 100vw;
      height: 300px;
    }
  </style>
</head>

<body>

  <!-- 시작 화면 -->
  <div id="startScreen">
    <h1>🎧 Back Sound</h1>

    <button onclick="startApp()">
      시작하기
    </button>
  </div>

  <!-- 메인 화면 -->
  <div id="mainScreen">
    <canvas id="wave"></canvas>

    <div id="ui">
    <div id="level">SOUND: 0</div>
    <div id="warning"></div>
  </div>
</div>

  <script>

    
async function startApp() {

  const stream = await navigator.mediaDevices.getUserMedia({
    audio: true
  });

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("mainScreen").style.display = "flex";

  const audioContext =
    new (window.AudioContext || window.webkitAudioContext)();

     await audioContext.resume();

  const analyser =
    audioContext.createAnalyser();

  const microphone =
    audioContext.createMediaStreamSource(stream);

  microphone.connect(analyser);

  await audioContext.resume();

  analyser.fftSize = 256;

  const bufferLength =
    analyser.frequencyBinCount;

  const dataArray =
    new Uint8Array(bufferLength);

  const canvas =
    document.getElementById("wave");

  const ctx =
    canvas.getContext("2d");

    let lastTrigger = 0;

    let baseline = 0;
    let samples = 0;

  canvas.width = window.innerWidth;
  canvas.height = 300;

 function draw() {

  requestAnimationFrame(draw);

  analyser.getByteFrequencyData(dataArray);

  // ===== 소리 감지 =====
  let sum = 0;

for (let i = 0; i < bufferLength; i++) {
  sum += dataArray[i];
}

const avg = sum / bufferLength;
const max = Math.max(...dataArray);

 // ===== 2. 기준값 학습 =====
  if (samples < 100) {
    baseline += avg;
    samples++;
    
  document.getElementById("level").innerText =
    "학습 중... " + samples + "%";

  return requestAnimationFrame(draw);
}

  const baseAvg = baseline / 100;

  let energy = 0;

for (let i = 0; i < bufferLength; i++) {
  energy += dataArray[i] * dataArray[i];
}

const rms = Math.sqrt(energy / bufferLength);

  // ===== 3. UI 표시 =====
  document.getElementById("level").innerText =
      "AVG: " + avg.toFixed(1) +
  " / MAX: " + max;

  // ===== 4. 위험 감지 =====
  if (
  avg > 5 &&
  Date.now() - lastTrigger > 2000
) {
  lastTrigger = Date.now();

  document.body.style.backgroundColor = "red";
  document.getElementById("warning").innerText = "⚠️ 위험한 소리 감지!";

  if (navigator.vibrate) {
    navigator.vibrate([300, 100, 300]);
  }

  const beep = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
  beep.volume = 1;
  beep.play()
  .then(() => console.log("재생 성공"))
  .catch(err => console.log("재생 실패", err));

} else {
  document.body.style.backgroundColor = "#111827";
  document.getElementById("warning").innerText = "";
}

  // ===== 5. 캔버스 그리기 =====
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const barWidth = (canvas.width / bufferLength) * 1.5;

  let x = 0;

  for (let i = 0; i < bufferLength; i++) {
    const barHeight = dataArray[i] * 1.7;
    const y = (canvas.height - barHeight) / 2;

    ctx.fillStyle = "white";
    ctx.fillRect(x, y, barWidth, barHeight);

    x += barWidth + 3;
  }
}
draw(); 
}

</script>
</body>
</html>
