<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <title>Back Sound</title>
    <style>
        body {
            margin: 0;
    background-color:white;
    color:black;
            font-family: Arial;
            overflow: hidden;
        }

        #mainScreen {
            width: 100vw;
            height: 100vh;
            display: none;
            justify-content: center;
            align-items: center;
            color: white;
            flex-direction: column;
        }

        button:hover {
            background-color: #c3db9c;
        }

        #ui {
            position: absolute;
            bottom:120px;
            left: 50%;
            transform:translateX(-50%);
            color: rgb(0, 0, 0);
            font-size: 26px;
            text-align: center;
            z-index: 10;
        }

        #level {
            font-size: 28px;
            font-weight: bold;
        }

        #warning {
            margin-top: 10px;
            font-size: 28px;
            color: rgb(255, 0, 0);
            font-weight: bold;
        }

        #aiResult {
            margin-top: 10px;
            font-size: 28px;
            color: rgb(0, 0, 0);
            font-weight: bold;
        }

        canvas{
    position:absolute;
    top:120px;
    left:0;
    width:100vw;
    height:380px;
}

        #mainScreen{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#bottomNav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:150px;

    background:white;
    border-top:1px solid #dcdcdc;

    display:flex;
    justify-content:space-between;
    align-items:center;

    border-top:1px solid #333;

    z-index:100;
}

.navItem{
    flex:1;
}

.navItem img{
    width:160px;
    height:160px;
    margin-bottom:4px;
}

.navItem span{
    font-size:32px;
    margin-top:2px;
}

.navItem.active{
   color:black;
    font-weight:bold;
}


    
    </style>
</head>

<body>
   <div id="mainScreen" style="display:flex;"> <canvas id="wave"></canvas>
       <div id="ui">
    <div id="level">SOUND: 0</div>
    <div id="aiResult">AI: 대기중</div>
    <div id="warning"></div>

    <div class="navItem">
        <img src="기록-removebg-preview.png">
        <span>기록</span>
    </div>

    <div class="navItem">
        <img src="가이드-removebg-preview.png">
        <span>가이드</span>
    </div>

    <div class="navItem active">
        <img src="홈-removebg-preview.png">
        <span>홈</span>
    </div>

    <div class="navItem">
        <img src="지도-removebg-preview.png">
        <span>설정</span>
    </div>

    <div class="navItem">
        <img src="내_정보-removebg-preview.png">
        <span>정보</span>
    </div>

</div>

<div id="bottomNav">

</div>
</div>
    </div>
<div id="debug" style="position:absolute; top:10px; left:10px; color:white; font-size:14px;"></div>
<script src="edge-impulse-standalone.js"></script>
<script src="run-impulse.js"></script>

<script>
let audioContext;
let analyser;
let dataArray;
let micStream;

let aiRunning = false;

let canvas;
let ctx;

let audioBuffer = [];

let isRunning = false;
let hornCounter = 0;
let bikeCounter = 0;

const SAMPLE_WINDOW = 48000;

window.classifier = null;
window.isAIReady = false;

function startApp() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("infoScreen").style.display = "flex";
}

async function enterMain() {
    try {
        log("시작 중...");

        document.getElementById("mainScreen").style.display = "flex";
        document.getElementById("infoScreen").style.display = "none";

        window.classifier = new EdgeImpulseClassifier();

        window.classifier.init()
        .then(() => {
            window.isAIReady = true;

            console.log(
                "Project:",
                window.classifier.getProjectInfo()
            );

            console.log(
                "Properties:",
                window.classifier.getProperties()
            );

            document.getElementById("debug").innerText =
            JSON.stringify(window.classifier.getProperties(), null, 2);

            const props = window.classifier.getProperties();
            console.log("props =", props);

            for (const key in props) {
                console.log(key, props[key]);
            }

            log("AI 준비 완료");
        })
        .catch(err => {
            log("AI 실패: " + err.message);
        });

        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        await audioContext.resume();

        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;

        const mic = audioContext.createMediaStreamSource(micStream);
        mic.connect(analyser);

        const processor = audioContext.createScriptProcessor(4096, 1, 1);
        mic.connect(processor);
        processor.connect(audioContext.destination);

        processor.onaudioprocess = function(e) {
            const input = e.inputBuffer.getChannelData(0);

            for (let i = 0; i < input.length; i++) {
        
                let s = Math.max(-1, Math.min(1, input[i]));
                audioBuffer.push(s < 0 ? s * 0x8000 : s * 0x7FFF);
            }

            
            if (audioBuffer.length > SAMPLE_WINDOW * 2) {
                audioBuffer = audioBuffer.slice(-SAMPLE_WINDOW * 2);
            }
        };

        dataArray = new Uint8Array(analyser.frequencyBinCount);

       
        canvas = document.getElementById("wave");
        ctx = canvas.getContext("2d");
        resizeCanvas();

        isRunning = true;

        drawLoop();
        aiLoop();

        log("실행 완료");

    } catch (e) {
        log("에러: " + e.message);
    }
}

function aiLoop() {
    if (!isRunning || !window.isAIReady || !window.classifier || aiRunning) {
        setTimeout(aiLoop, 250);
        return;
    }

    if (audioBuffer.length < SAMPLE_WINDOW) {
        document.getElementById("aiResult").innerText = "버퍼 수집중...";
        setTimeout(aiLoop, 250);
        return;
    }

    aiRunning = true;

    let currentVolume = 0;
    if (dataArray) {
        let sum = 0;
        for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
        currentVolume = sum / dataArray.length;
    }

    if (currentVolume < 45) { 
        document.getElementById("aiResult").innerText = "일상 소음";
        document.body.style.backgroundColor = "white";
        document.getElementById("warning").innerText = "";
        
        hornCounter = 0;
        bikeCounter = 0;

        aiRunning = false;
        setTimeout(aiLoop, 250);
        return;
    }

    const inputSlice = audioBuffer.slice(-SAMPLE_WINDOW);
    const input = new Float32Array(inputSlice);

    try {
        const result = window.classifier.classify(input);

        if (result?.results) {
            let hornScore = 0;
            let bikeScore = 0;

            result.results.forEach(r => {
                if (r.label.includes("경적") || r.label.toLowerCase().includes("horn")) {
                    hornScore = r.value;
                }
                if (r.label.includes("오토바이") || r.label.toLowerCase().includes("bike") || r.label.toLowerCase().includes("motor")) {
                    bikeScore = r.value;
                }
            });

            if (hornScore >= 0.8) {
                hornCounter++;
                bikeCounter = 0;
            } 
           
            else if (bikeScore >= 0.8) {
                bikeCounter++;
                hornCounter = 0;
            } 
           
            else {
                hornCounter = 0;
                bikeCounter = 0;
            }

if (hornCounter >= 2) {
    document.getElementById("aiResult").innerText = "자동차 경적 소리 감지"; 
    document.body.style.backgroundColor = "red";
    document.getElementById("warning").innerText = "위험";
    
    playBeep(); 
    if (navigator.vibrate) navigator.vibrate([300, 100, 300]); 
} 
else if (bikeCounter >= 2) {
    document.getElementById("aiResult").innerText = "오토바이 소리 감지"; 
    document.body.style.backgroundColor = "red";
    document.getElementById("warning").innerText = "위험";
    
    playBeep(); 
    if (navigator.vibrate) navigator.vibrate([300, 100, 300]); 
}

            else {
                document.getElementById("aiResult").innerText = "일상 소음";
                document.body.style.backgroundColor = "#111827";
                document.getElementById("warning").innerText = "";
            }
        }
    }
    catch(err) {
        console.error("AI error:", err);
    }

    aiRunning = false;
    setTimeout(aiLoop, 250);
}


function playBeep() {

    const oscillator =
        audioContext.createOscillator();

    const gainNode =
        audioContext.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);

    oscillator.frequency.value = 1000;
    oscillator.type = "sine";

    gainNode.gain.setValueAtTime(
        0.2,
        audioContext.currentTime
    );

    oscillator.start();

    oscillator.stop(
        audioContext.currentTime + 0.2
    );
}

function drawLoop() {

    requestAnimationFrame(drawLoop);

    if (!isRunning) return;
    if (!analyser || !dataArray || !ctx) return;

    analyser.getByteFrequencyData(dataArray);

    let sum = 0;
    for (let i = 0; i < dataArray.length; i++) {
        sum += dataArray[i];
    }

    const avg = sum / dataArray.length;

    document.getElementById("level").innerText =
    "SOUND: " + Math.round(avg);

    if (avg > 80) {
    document.body.style.backgroundColor = "red";
    document.getElementById("warning").innerText = "위험";
    document.getElementById("aiResult").innerText = "큰 소리 감지!"; 

    playBeep();
    if (navigator.vibrate) navigator.vibrate(200);

} else {
   
    if (hornCounter < 2 && bikeCounter < 2) {
        document.body.style.backgroundColor = "#111827";
        document.getElementById("warning").innerText = "";
        if (avg >= 45) {
            document.getElementById("aiResult").innerText = "일상 소음";
        }
    }
}

    
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let x = 0;
    const barWidth = (canvas.width / dataArray.length) * 1.5;

    for (let i = 0; i < dataArray.length; i++) {
        const barHeight = dataArray[i] * 1.7;
        const y = (canvas.height - barHeight) / 2;

        ctx.fillStyle = "black";
        ctx.fillRect(x, y, barWidth, barHeight);

        x += barWidth + 3;
    }
}

function resizeCanvas() {
    if (!canvas) return;
    canvas.width = window.innerWidth;
    canvas.height = 300;
}

window.addEventListener("resize", resizeCanvas);

function log(msg) {
    document.getElementById("debug").innerText =
        typeof msg === "object"
            ? JSON.stringify(msg, null, 2)
            : msg;
}

window.onload = () => {
    enterMain();
};
</script>
