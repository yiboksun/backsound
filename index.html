<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <title>Back Sound</title>

  <style>
 body
 {
      margin: 0;
      background-color: #111827;
      font-family: Arial;
      overflow: hidden;
    } 

 #startScreen,
#infoScreen,
#mainScreen {
  width: 100vw;
  height: 100vh;
  display: none;
  justify-content: center;
  align-items: center;
  color: white;
  flex-direction: column;
}

#startScreen {
  display: flex;
}

button {
  background-color: #35353549;
  color: white;
  border: none;
  padding: 18px 40px;
  border-radius: 15px;
  font-size: 20px;
  cursor: pointer;
}

button:hover {
  background-color: #c3db9c;
}

   #ui {
  position: absolute;
  top: 60%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 26px;
  text-align: center;
  z-index: 10;
}

#level {
  font-size: 28px;
  font-weight: bold;
}

#warning {
  margin-top: 10px;
  font-size: 28px;
  color: rgb(255, 255, 255);
  font-weight: bold;
}

canvas {
  width: 100vw;
  height: 300px;
}
</style>


</head>

<body>

  <!-- 시작 화면 -->
  <div id="startScreen">
    <h1>🎧 Back Sound</h1>

    <button onclick="startApp()">
      시작하기
    </button>
  </div>

  <!-- 설명 화면 -->
<div id="infoScreen" style="display:none;">
  <div>
    <h2>Back Sound 소개</h2>

    <p>
      이어폰 사용 중 주변 위험 소리를 감지하여 알려주는 보행 안전 시스템입니다.
    </p>

    <p>
      위험도 단계, 진동 알림, 보행 분석 기능을 제공합니다.
    </p>

    <button onclick="enterMain()">확인</button>
  </div>
</div>

  <!-- 메인 화면 -->
  <div id="mainScreen">
    <canvas id="wave"></canvas>

    <div id="ui">
    <div id="level">SOUND: 0</div>
    <div id="warning"></div>
  </div>
</div>

  <script>
    async function startApp() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("infoScreen").style.display = "flex";
}

async function enterMain() {

  document.getElementById("infoScreen").style.display = "none";
  document.getElementById("mainScreen").style.display = "flex";

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  const audioContext = new (window.AudioContext || window.webkitAudioContext)();
  await audioContext.resume();

  const analyser = audioContext.createAnalyser();
  const microphone = audioContext.createMediaStreamSource(stream);

  microphone.connect(analyser);

  analyser.fftSize = 256;

  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  const canvas = document.getElementById("wave");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = 300;

  let baseline = 0;
  let samples = 0;
  let lastTrigger = 0;
  let warningUntil = 0;

  function draw() {
    requestAnimationFrame(draw);

    analyser.getByteFrequencyData(dataArray);

    let sum = 0;
    for (let i = 0; i < bufferLength; i++) {
      sum += dataArray[i];
    }

    const avg = sum / bufferLength;

    if (samples < 100) {
      baseline += avg;
      samples++;
      document.getElementById("level").innerText =
        "학습 중... " + samples + "%";
      return;
    }

    const baseAvg = baseline / 100;

    document.getElementById("level").innerText =
      "SOUND: " + Math.round(avg);

    if (avg > baseAvg + 20 && Date.now() - lastTrigger > 1000) {
      lastTrigger = Date.now();
      warningUntil = Date.now() + 1000;

      if (navigator.vibrate) {
        navigator.vibrate([300, 100, 300]);
      }
    }

    if (Date.now() < warningUntil) {
      document.body.style.backgroundColor = "red";
      document.getElementById("warning").innerText = "⚠️ 위험 감지!";
    } else {
      document.body.style.backgroundColor = "#111827";
      document.getElementById("warning").innerText = "";
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let x = 0;
    const barWidth = (canvas.width / bufferLength) * 1.5;

    for (let i = 0; i < bufferLength; i++) {
      const barHeight = dataArray[i] * 1.7;
      const y = (canvas.height - barHeight) / 2;

      ctx.fillStyle = "white";
      ctx.fillRect(x, y, barWidth, barHeight);

      x += barWidth + 3;
    }
  }

  draw();
}

    
</script>
</body>
</html>
